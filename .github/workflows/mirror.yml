name: Sync to Customer Repo
 
on:
  push:
    branches:
      - main
 
jobs:
  mirror:
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4.1.7
      with:
        fetch-depth: 0
 
    - name: Configure Git
      run: |
        git config --global user.name "saravanan014"
        git config --global user.email "saravanan014@users.noreply.github.com"
 
    - name: Inject PAT into remote (CRITICAL STEP)
      env:
        TOKEN: ${{ secrets.TARGET_PAT }}
      run: |
        git remote set-url origin https://saravanan014:$TOKEN@github.com/saravanan014/te_test.git
        git remote add customer https://saravanan014:$TOKEN@github.com/revendh/cust_test.git
 
    - name: Debug remotes (IMPORTANT)
      run: |
        git remote -v
 
    - name: Push to customer repo
      run: |
        git push customer main
 
