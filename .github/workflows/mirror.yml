name: Sync to Customer Repo
 
on:
  push:
    branches:
      - main
 
jobs:
  mirror:
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4.1.7
      with:
        fetch-depth: 0
 
    - name: Configure Git
      run: |
        git config --global user.name "mirror-bot"
        git config --global user.email "mirror@github.com"
 
    # ✅ FORCE AUTHENTICATION
    - name: Inject PAT globally
      env:
        TOKEN: ${{ secrets.TARGET_PAT }}
      run: |
        git config --global url."https://$TOKEN@github.com/".insteadOf "https://github.com/"
 
    # ✅ TEST ACCESS (VERY IMPORTANT)
    - name: Test access to customer repo
      run: |
        git ls-remote https://github.com/revendh/cust_test.git
 
    # ✅ ADD REMOTE
    - name: Add remote
      run: |
        git remote add customer https://github.com/revendh/cust_test.git
 
    # ✅ PUSH
    - name: Push to customer repo
      run: |
        git push customer main
 
